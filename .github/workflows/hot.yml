name: 实时热搜自动抓取

on:
  schedule:
    - cron: '*/30 * * * *'  # 每30分钟跑一次
  workflow_dispatch:        # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    steps>      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: |
          pip install -r requirements.txt

      - name: 运行热搜抓取
        run: |
          python main.py

      - name: 提交最新热搜数据
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@github.com"
          git add output/
          git commit -m "自动更新热搜数据 $(date '+%Y-%m-%d %H:%M')" || exit 0
          git push
