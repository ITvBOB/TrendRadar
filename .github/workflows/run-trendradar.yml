name: 运行 TrendRadar 并生成最新 JSON

on:
  schedule:
    - cron: '*/30 * * * *'  # 每30分钟更新一次
  workflow_dispatch:        # 允许手动运行

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run TrendRadar
        run: |
          python main.py

      - name: 生成统一最新数据 latest.json
        run: |
          mkdir -pm 755 public
          find . -name "*.json" -type f | head -1 | xargs -I {} cp {} public/latest.json

      - name: Commit and push
        uses: EndBug/add-and-commit@v9
        with:
          message: "Auto update latest.json"
          add: "public/latest.json"
